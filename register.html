<!DOCTYPE html>
<html>
<head>
    <title>Đăng ký học phần</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f4f4f4;
        }

        select, button {
            padding: 10px;
            margin-top: 10px;
        }

        button {
            background: green;
            color: white;
            border: none;
        }
    </style>
</head>

<body>
    <h2>Đăng ký học phần</h2>

    <select>
        <option>Lập trình C</option>
        <option>Cơ sở dữ liệu</option>
    </select>

    <br>
    <button onclick="alert('Đăng ký thành công!')">
        Đăng ký
    </button>
</body>
</html>

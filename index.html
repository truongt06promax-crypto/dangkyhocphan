<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Đăng nhập</title>
<style>
body{
    font-family: Arial;
    background:#f0f0f0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.box{
    background:white;
    padding:30px;
    border-radius:10px;
    width:300px;
    text-align:center;
    box-shadow:0 0 10px gray;
}
input{
    width:100%;
    padding:10px;
    margin:10px 0;
}
button{
    width:100%;
    padding:10px;
    background:#007bff;
    color:white;
    border:none;
}
a{font-size:14px;}
</style>
</head>

<body>
<div class="box">
<h2>Đăng nhập</h2>
<p>Dành cho sinh viên</p>

<input type="text" placeholder="Mã sinh viên">
<input type="password" placeholder="Mật khẩu">

<a href="dashboard.html">
<button>Đăng nhập</button>
</a>

<a href="#">Quên mật khẩu</a>
</div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Đăng nhập</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
        }

        .login-box {
            background: white;
            width: 300px;
            margin: 100px auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            padding: 10px 20px;
            background: #4facfe;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #007bff;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <h2>Đăng nhập hệ thống</h2>

        <input type="text" placeholder="Username"><br>
        <input type="password" placeholder="Password"><br>

        <a href="dashboard.html">
            <button>Đăng nhập</button>
        </a>
    </div>
</body>
</html>
